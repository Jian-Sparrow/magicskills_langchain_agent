version: '3.8'

services:
  magicskills:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magicskills-all-in-one
    restart: unless-stopped
    ports:
      - "5002:5000"
    environment:
      # Skills configuration
      - SKILLS_DIR=/app/workspace/skills/allskills
      - AGENTS_MD_PATH=/app/workspace/AGENTS.md
      # DashScope API configuration (阿里云通义千问)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-qwen3-max}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"